<!-- ═══════════════════════════════════════════
     login.html
     ═══════════════════════════════════════════ -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0E0B14"><link rel="manifest" href="/manifest.json">
<title>JUPITE – Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--r:#E8364A;--rose:#FF6B8A;--or:#F5C842;--noir:#0E0B14;--d1:#1A1525;--d2:#231D32;--t:#F0EBF8;--g:#9B8FB0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--noir);color:var(--t);min-height:100svh;display:flex;align-items:center;justify-content:center;}
.o{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;}
.o1{width:350px;height:350px;background:var(--r);opacity:.2;top:-80px;left:-80px;}
.o2{width:280px;height:280px;background:#7B3FF5;opacity:.18;bottom:-60px;right:-60px;}
.card{background:var(--d1);border:1px solid rgba(255,255,255,.07);border-radius:26px;
  padding:40px 30px;width:100%;max-width:400px;margin:20px;}
.logo{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:700;
  background:linear-gradient(135deg,var(--r),var(--rose),var(--or));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:6px;background-clip: text;}
.sub{text-align:center;color:var(--g);font-size:.88rem;margin-bottom:32px;}
.fg{margin-bottom:17px;}
label{display:block;font-size:.82rem;color:var(--g);margin-bottom:7px;}
input{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:13px;
  color:var(--t);padding:13px 16px;font-size:.93rem;width:100%;outline:none;
  font-family:'Plus Jakarta Sans',sans-serif;transition:border-color .2s;}
input:focus{border-color:var(--rose);}
input::placeholder{color:var(--g);}
.btn{width:100%;background:linear-gradient(135deg,var(--r),var(--rose));color:#fff;border:none;
  border-radius:50px;padding:15px;font-size:.98rem;font-weight:600;cursor:pointer;
  margin-top:6px;transition:.25s;font-family:'Plus Jakarta Sans',sans-serif;}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(232,54,74,.4);}
.err{color:var(--r);font-size:.82rem;text-align:center;margin-top:10px;display:none;}
.liens{display:flex;justify-content:space-between;margin-top:22px;font-size:.84rem;}
.liens a{color:var(--rose);text-decoration:none;}
</style>
</head>
<body>
<div class="o o1"></div><div class="o o2"></div>
<div class="card">
  <div class="logo">JUPITE</div>
  <p class="sub">Content de vous revoir ✨</p>
  <div class="fg"><label>Email</label><input type="email" id="email" placeholder="votre@email.com"></div>
  <div class="fg"><label>Mot de passe</label><input type="password" id="pw" placeholder="••••••••"></div>
  <p class="err" id="err"></p>
  <button class="btn" onclick="login()">Se connecter</button>
  <div class="liens"><a href="/">← Accueil</a><a href="/inscription">Créer un compte</a></div>
</div>
<script>
async function login(){
  const btn=document.querySelector('.btn');
  btn.textContent='Connexion...';
  const r=await fetch('/api/connexion',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:document.getElementById('email').value,password:document.getElementById('pw').value})});
  const d=await r.json();
  if(d.success)window.location.href=d.redirect;
  else{document.getElementById('err').textContent=d.message;document.getElementById('err').style.display='block';btn.textContent='Se connecter';}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')login();});
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
</body>
</html>
