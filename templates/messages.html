<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0E0B14"><link rel="manifest" href="/manifest.json">
<title>JUPITE – Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--r:#E8364A;--rose:#FF6B8A;--or:#F5C842;--noir:#0E0B14;--d1:#1A1525;--d2:#231D32;--t:#F0EBF8;--g:#9B8FB0;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--noir);color:var(--t);
  display:flex;flex-direction:column;}
/* Header */
.hd{display:flex;align-items:center;gap:14px;padding:calc(env(safe-area-inset-top,10px) + 10px) 16px 12px;
  background:var(--d1);border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;}
.back{color:var(--rose);text-decoration:none;font-size:1.3rem;padding:4px 8px;}
.hd-av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--r),var(--rose));
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.hd-info{flex:1;min-width:0;}
.hd-nom{font-weight:600;font-size:.95rem;}
.hd-st{font-size:.75rem;color:var(--g);}
/* Coin bar */
.coin-bar{background:var(--d2);border-bottom:1px solid rgba(255,255,255,.06);
  padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.cb-left{display:flex;align-items:center;gap:8px;font-size:.8rem;}
.cb-coins{color:var(--or);font-weight:600;}
.cb-cost{color:var(--g);}
.cb-btn{background:linear-gradient(135deg,var(--r),var(--rose));color:#fff;border:none;
  border-radius:50px;padding:5px 14px;font-size:.75rem;font-weight:600;cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;}
/* Messages */
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;
  padding-bottom:16px;}
.msg{max-width:72%;padding:11px 15px;border-radius:18px;font-size:.9rem;line-height:1.45;}
.msg.moi{align-self:flex-end;background:linear-gradient(135deg,var(--r),var(--rose));color:#fff;border-bottom-right-radius:5px;}
.msg.autre{align-self:flex-start;background:var(--d2);border:1px solid rgba(255,255,255,.07);border-bottom-left-radius:5px;}
.msg-h{font-size:.68rem;opacity:.55;margin-top:4px;}
.msg.moi .msg-h{text-align:right;}
.sep{text-align:center;color:var(--g);font-size:.72rem;margin:6px 0;}
/* Input */
.input-zone{padding:12px 16px calc(12px + env(safe-area-inset-bottom,0px));
  background:var(--d1);border-top:1px solid rgba(255,255,255,.07);
  display:flex;gap:10px;align-items:flex-end;flex-shrink:0;}
.mi{flex:1;background:var(--d2);border:1.5px solid rgba(255,255,255,.1);border-radius:22px;
  color:var(--t);padding:11px 16px;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:.92rem;outline:none;resize:none;max-height:120px;transition:border-color .2s;}
.mi:focus{border-color:var(--rose);}
.mi::placeholder{color:var(--g);}
.send{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--r),var(--rose));
  border:none;color:#fff;font-size:1.1rem;cursor:pointer;flex-shrink:0;transition:.2s;}
.send:hover{transform:scale(1.08);}
/* Modal insuffisant */
.low-modal{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);
  display:flex;align-items:flex-end;justify-content:center;z-index:200;
  opacity:0;pointer-events:none;transition:.3s;}
.low-modal.show{opacity:1;pointer-events:all;}
.low-card{background:var(--d1);border-radius:28px 28px 0 0;padding:32px 24px calc(32px + env(safe-area-inset-bottom,0px));
  width:100%;max-width:480px;border:1px solid rgba(232,54,74,.25);
  animation:slideUp .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.low-ico{font-size:3rem;text-align:center;margin-bottom:12px;}
.low-title{font-size:1.3rem;font-weight:700;text-align:center;margin-bottom:6px;}
.low-txt{color:var(--g);font-size:.88rem;text-align:center;line-height:1.5;margin-bottom:22px;}
.low-pieces{font-size:2rem;font-weight:700;color:var(--or);text-align:center;margin-bottom:6px;}
.low-btns{display:flex;flex-direction:column;gap:10px;}
.low-btn{background:linear-gradient(135deg,var(--r),var(--rose));color:#fff;border:none;
  border-radius:50px;padding:14px;font-size:.98rem;font-weight:600;cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;}
.low-skip{background:transparent;color:var(--g);border:1.5px solid rgba(255,255,255,.1);
  border-radius:50px;padding:13px;font-size:.88rem;cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;}
</style>
</head>
<body>
<div class="hd">
  <a href="/matches" class="back">←</a>
  <div class="hd-av" id="hdAv">😊</div>
  <div class="hd-info">
    <div class="hd-nom" id="hdNom">Chargement…</div>
    <div class="hd-st">Match JUPITE 💕</div>
  </div>
  <div style="font-size:.75rem;color:var(--g);" id="hdCoins">🪙 …</div>
</div>

<div class="coin-bar">
  <div class="cb-left">
    🪙 <span class="cb-coins" id="cbCoins">…</span>
    <span class="cb-cost">· 40 pièces / message</span>
  </div>
  <button class="cb-btn" onclick="location.href='/recharger'">Recharger</button>
</div>

<div class="msgs" id="msgs">
  <div class="sep">Aujourd'hui</div>
</div>

<div class="input-zone">
  <textarea class="mi" id="mi" rows="1" placeholder="Votre message… (40 🪙)"></textarea>
  <button class="send" onclick="send()">➤</button>
</div>

<!-- Modal solde insuffisant -->
<div class="low-modal" id="lowModal">
  <div class="low-card">
    <div class="low-ico">🪙</div>
    <div class="low-title">Solde insuffisant</div>
    <div class="low-pieces" id="lowPieces">0 pièces</div>
    <div class="low-txt">Chaque message coûte <strong>40 pièces</strong>.<br>Rechargez pour continuer à discuter.</div>
    <div class="low-btns">
      <button class="low-btn" onclick="location.href='/recharger'">💳 Recharger mes pièces</button>
      <button class="low-skip" onclick="document.getElementById('lowModal').classList.remove('show')">Fermer</button>
    </div>
  </div>
</div>

<script>
const matchId = {{ match_id }};
const EMOJIS = ['😊','🌟','💃','🧑‍🦱','👩‍🦰','🎭','🌺','🎨','🏄','🎵','🦋','🌙'];

async function loadCoins(){
  const r = await fetch('/api/pieces/solde');
  const d = await r.json();
  document.getElementById('cbCoins').textContent = d.pieces.toLocaleString();
  document.getElementById('hdCoins').textContent = `🪙 ${d.pieces.toLocaleString()}`;
  return d.pieces;
}

async function loadMsgs(){
  const r = await fetch(`/api/messages/${matchId}`);
  const msgs = await r.json();
  const area = document.getElementById('msgs');
  area.innerHTML = '<div class="sep">Aujourd\'hui</div>';
  if(!msgs.length){
    const h = document.createElement('div');
    h.style.cssText = 'text-align:center;color:var(--g);font-size:.88rem;margin:40px auto;';
    h.textContent = '👋 Envoyez le premier message !';
    area.appendChild(h);
  } else {
    msgs.forEach(m=>{
      const d=document.createElement('div');
      d.className='msg '+(m.moi?'moi':'autre');
      d.innerHTML=`${m.contenu}<div class="msg-h">${m.date}</div>`;
      area.appendChild(d);
    });
  }
  area.scrollTop = area.scrollHeight;
}

async function send(){
  const inp = document.getElementById('mi');
  const txt = inp.value.trim();
  if(!txt) return;

  const coins = await loadCoins();
  if(coins < 40){
    document.getElementById('lowPieces').textContent = `${coins} pièce${coins>1?'s':''}`;
    document.getElementById('lowModal').classList.add('show');
    return;
  }

  inp.value=''; inp.style.height='auto';
  const r = await fetch('/api/messages/envoyer',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({match_id:matchId,contenu:txt})
  });
  const d = await r.json();
  if(!d.success && d.code==='PIECES_INSUFFISANTES'){
    document.getElementById('lowPieces').textContent = `${d.pieces} pièce${d.pieces>1?'s':''}`;
    document.getElementById('lowModal').classList.add('show');
    return;
  }
  if(d.success){
    document.getElementById('cbCoins').textContent = d.pieces.toLocaleString();
    document.getElementById('hdCoins').textContent = `🪙 ${d.pieces.toLocaleString()}`;
    loadMsgs();
  }
}

document.getElementById('mi').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
});
document.getElementById('mi').addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,120)+'px';
});

loadCoins(); loadMsgs();
setInterval(loadMsgs,5000);
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
</body>
</html>
